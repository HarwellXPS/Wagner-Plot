<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WagnerPlot — XPS Chemical State Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #07101f;
  --surface: #0d1829;
  --surface2: #142035;
  --surface3: #1a2a42;
  --border: #1e3052;
  --accent: #38bdf8;
  --accent-dim: #0ea5e9;
  --amber: #f59e0b;
  --green: #22c55e;
  --red: #f87171;
  --text: #e2eaf4;
  --muted: #5a7294;
  --muted2: #3a5070;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ---- HEADER ---- */
header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 20px;
  height: 52px;
  min-height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo em { color: var(--accent); font-style: normal; }
.tagline {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  border-left: 1px solid var(--border);
  padding-left: 16px;
}
.header-pill {
  margin-left: auto;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
}

/* ---- LAYOUT ---- */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ---- SIDEBAR ---- */
.sidebar {
  width: 290px;
  min-width: 270px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
}
.sidebar-scroll {
  flex: 1;
  overflow: hidden;
}
.panel {
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
}
.panel-title {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .badge {
  background: var(--surface3);
  color: var(--accent);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 10px;
  letter-spacing: 0;
}
label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  margin-bottom: 3px;
  letter-spacing: 0.5px;
}
label:first-child { margin-top: 0; }
select, input[type="text"], input[type="number"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 9px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
select:focus, input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(56,189,248,0.12);
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 36px; gap: 8px; align-items: end; }
.readonly-field {
  background: var(--surface) !important;
  color: var(--muted) !important;
  cursor: default;
}
.ap-field {
  background: var(--surface) !important;
  color: var(--amber) !important;
  font-weight: 700;
  cursor: default;
}
.color-swatch {
  width: 36px;
  height: 30px;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.color-swatch:hover { border-color: var(--accent); }
.color-swatch input[type="color"] {
  position: absolute;
  top: -4px; left: -4px;
  width: calc(100% + 8px);
  height: calc(100% + 8px);
  opacity: 0;
  cursor: pointer;
  border: none;
  padding: 0;
}
.btn-add {
  width: 100%;
  margin-top: 12px;
  padding: 9px;
  background: var(--accent);
  color: #04111f;
  border: none;
  border-radius: 4px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-add:hover { background: #7dd3fc; }
.btn-add:active { transform: scale(0.98); }

/* ---- DATA LIST ---- */
/* ---- DATA STRIP (bottom of plot panel) ---- */
.data-strip {
  height: 130px;
  min-height: 130px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  overflow: hidden;
}
.strip-sidebar {
  width: 90px;
  min-width: 90px;
  border-right: 1px solid var(--border);
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.strip-title {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.strip-cards {
  flex: 1;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.data-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 4px;
  padding: 7px 8px;
  min-width: 148px;
  max-width: 160px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: background 0.1s;
}
.data-card:hover { background: var(--surface3); }
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 2px;
}
.card-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.card-del {
  background: transparent;
  border: none;
  color: var(--muted2);
  cursor: pointer;
  font-size: 10px;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.1s;
}
.card-del:hover { color: var(--red); }
.card-val {
  font-size: 9.5px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
}
.card-ap {
  font-size: 9.5px;
  color: var(--amber);
  font-family: 'Space Mono', monospace;
  font-weight: 700;
}
.strip-empty {
  display: flex;
  align-items: center;
  color: var(--muted2);
  font-size: 11px;
  padding: 0 8px;
  font-style: italic;
}
.data-row-vals {
  font-size: 9px;
  color: var(--muted);
  margin-top: 1px;
}

/* ---- PLOT PANEL ---- */
.plot-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}
.tb-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.btn-exp {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 5px 13px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn-exp:hover { border-color: var(--accent); color: var(--accent); }
.btn-exp.csv:hover { border-color: var(--green); color: var(--green); }
.tog {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 4px;
  padding: 4px 11px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
}
.tog.on { background: rgba(56,189,248,0.12); border-color: var(--accent); color: var(--accent); }
.plot-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  overflow: auto;
  min-height: 0;
}
#plotSvg {
  background: white;
  border-radius: 4px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  max-width: 100%;
  flex-shrink: 0;
}

/* ---- LOGO PANEL ---- */
.logo-panel {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--surface);
}
.logo-panel img {
  max-width: 130px;
  opacity: 0.9;
  filter: brightness(1.05);
}

/* ---- ANCHOR / SLOPE LINES ---- */
.card-anchor {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted2);
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  line-height: 1;
}
.card-anchor:hover { border-color: var(--amber); color: var(--amber); }
.card-anchor.anchored { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.15); }
.slope-legend {
  position: absolute;
  bottom: 138px;
  right: 8px;
  background: rgba(255,255,255,0.92);
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  padding: 5px 8px;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: #334155;
  pointer-events: none;
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <div class="logo">WAGNER<em>PLOT</em></div>
  <div class="tagline">XPS Chemical State Analysis</div>
  <div class="header-pill">Modified Auger Parameter α' = BE + KE</div>
</header>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">

      <!-- ADD DATA POINT -->
      <div class="panel">
        <div class="panel-title">Add Data Point</div>

        <label>Element</label>
        <select id="elSel" onchange="onElChange()">
          <option value="">— Select Element —</option>
        </select>

        <label>Reference Compound / State</label>
        <select id="cmpSel" onchange="onCmpChange()">
          <option value="">— Select or enter manually below —</option>
        </select>

        <div class="row2">
          <div>
            <label>Core Level</label>
            <input type="text" id="coreField" class="readonly-field" placeholder="e.g. Cu 2p₃/₂" readonly>
          </div>
          <div>
            <label>Auger Trans.</label>
            <input type="text" id="augerField" class="readonly-field" placeholder="e.g. Cu LMM" readonly>
          </div>
        </div>

        <div class="row2">
          <div>
            <label>Binding Energy (eV)</label>
            <input type="number" id="beField" placeholder="BE" step="0.1" oninput="calcAP()">
          </div>
          <div>
            <label>Auger KE (eV)</label>
            <input type="number" id="keField" placeholder="KE" step="0.1" oninput="calcAP()">
          </div>
        </div>

        <label>Auger Parameter α'</label>
        <input type="text" id="apField" class="ap-field" placeholder="— eV" readonly>

        <label>Point Label</label>
        <input type="text" id="lblField" placeholder="e.g. CuO">

        <div class="row3">
          <div>
            <label>Marker Colour</label>
            <div class="color-swatch" id="swatchDiv">
              <input type="color" id="colPick" value="#ef4444" oninput="updateSwatch()">
            </div>
          </div>
          <div>
            <label>Marker Size</label>
            <input type="number" id="szField" value="6" min="2" max="18" step="1">
          </div>
          <div style="grid-column:3"><!-- spacer --></div>
        </div>

        <button class="btn-add" onclick="addPoint()">+ ADD TO PLOT</button>
      </div>

      <!-- PLOT SETTINGS -->
      <div class="panel">
        <div class="panel-title">Plot Settings</div>
        <label>Plot Title (optional)</label>
        <input type="text" id="titleField" placeholder="e.g. Cu species on SiO₂" oninput="renderPlot()">
        <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap">
          <button class="tog on" id="togLines" onclick="toggle('lines')">α' Lines</button>
          <button class="tog on" id="togLabels" onclick="toggle('labels')">Labels</button>
          <button class="tog on" id="togGrid" onclick="toggle('grid')">Grid</button>
          <button class="tog on" id="togRef" onclick="toggle('ref')">Ref Data</button>
          <button class="tog on" id="togOrtho" onclick="toggle('ortho')" title="Equal eV/pixel on both axes so α' lines appear at true 45°">Ortho Scale</button>
          <button class="tog" id="togSlope" onclick="toggle('slopeLines')" title="Slope=1: α' constant, initial state varies. Slope=3: initial state constant, final state varies. Set anchor (⊙) on a card below to draw lines through that point.">S1/S3 Lines</button>
        </div>
      </div>


  <!-- LOGO PANEL -->

function addPoint(){

  pts.push({
    id: nextId++,
    be, ke,
    label: lbl || `BE=${be} KE=${ke}`,
    color: col,
    size: Math.max(2, Math.min(18, sz)),
    element: sym || '?',
    core: el ? el.core  : document.getElementById('coreField').value,
    auger: el ? el.auger : document.getElementById('augerField').value,

  // Advance palette for next point
  palIdx = (palIdx + 1) % PALETTE.length;
  document.getElementById('colPick').value = PALETTE[palIdx];
  updateSwatch();

  renderList();
  renderPlot();
}

    const anchorStyle = isAnchored ? `border-left-color:${p.color}; box-shadow:0 0 0 1px var(--amber) inset` : `border-left-color:${p.color}`;

// ============================================================
// SVG PLOT ENGINE
// ============================================================
function niceRange(lo, hi, ticks){
  if(lo===hi){ lo-=1; hi+=1; }
  const span = hi-lo;
  const rough = span/ticks;
  const mag   = Math.pow(10, Math.floor(Math.log10(rough)));
  const step  = [1,2,2.5,5,10].map(f=>f*mag).find(f=>rough<=f)||mag*10;
  return { min:Math.floor(lo/step)*step, max:Math.ceil(hi/step)*step, step };
}

function toSVG(be, ke, ber, ker){
  // Standard Wagner plot convention (Moretti 1998, Wagner 1975):
  //   X-axis: Binding Energy in the NEGATIVE direction
  //           → high BE on the LEFT (x = PAD.l), low BE on the RIGHT (x = PAD.l + PW)
  //   Y-axis: Auger Kinetic Energy increasing UPWARD
  //           → low KE at the BOTTOM (y = PAD.t + PH), high KE at the TOP (y = PAD.t)
  // α' = BE + KE = const lines therefore appear with slope +1 in screen coords.
  const x = PAD.l + (ber.max - be) / (ber.max - ber.min) * PW;
  const y = PAD.t + PH - (ke - ker.min) / (ker.max - ker.min) * PH;
  return { x, y };
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmt(v){ return v%1===0 ? String(v) : v.toFixed(1); }

function renderPlot(){
  const svg = document.getElementById('plotSvg');
  svg.innerHTML = buildSVG();
}

function buildSVG(){
  const title = document.getElementById('titleField').value.trim();

  // ── 1. Determine axis ranges ───────────────────────────────────────────────
  // Standard convention: ber = BE range (x-axis), ker = KE range (y-axis)
  let ber, ker;
  if(pts.length===0){
    ber = {min:930, max:938, step:2};   // BE on x-axis
    ker = {min:910, max:920, step:2};   // KE on y-axis
  } else {
    const bes = pts.map(p=>p.be), kes = pts.map(p=>p.ke);
    const beSpan = Math.max(...bes)-Math.min(...bes);
    const keSpan = Math.max(...kes)-Math.min(...kes);
    const bPad = Math.max(beSpan*0.25, 1), kPad = Math.max(keSpan*0.25, 2);
    ber = niceRange(Math.min(...bes)-bPad, Math.max(...bes)+bPad, 6);
    ker = niceRange(Math.min(...kes)-kPad, Math.max(...kes)+kPad, 5);
  }

  // ── 2. Enforce equal scale (orthogonal axes) ───────────────────────────────
  // Equal px/eV on both axes makes α' diagonals appear at exactly 45°.
  if(opts.ortho && pts.length>0){
    const scBE = PW/(ber.max-ber.min);  // px per eV, BE axis
    const scKE = PH/(ker.max-ker.min);  // px per eV, KE axis
    if(scBE < scKE){
      const half=(PH/scBE)/2, mid=(ker.max+ker.min)/2;
      ker={min:mid-half, max:mid+half, step:ker.step};
    } else if(scKE < scBE){
      const half=(PW/scKE)/2, mid=(ber.max+ber.min)/2;
      ber={min:mid-half, max:mid+half, step:ber.step};
    }
  }

  // ── 3. Axis label text ─────────────────────────────────────────────────────
  const syms=[...new Set(pts.map(p=>p.element).filter(Boolean))];
  const elData=syms.map(s=>dbClean.find(e=>e.sym===s)).filter(Boolean);
  // X-axis = BE (core level), Y-axis = Auger KE (transition)
  const xLbl = elData.length===1 ? `${elData[0].core} Binding Energy (eV)` : 'Binding Energy (eV)';
  const yLbl = elData.length===1 ? `${elData[0].auger} Kinetic Energy (eV)` : 'Auger Kinetic Energy (eV)';
  const plotTitle = title||(syms.length>0 ? `Wagner Plot — ${syms.join(', ')}` : 'Wagner Plot');

  let out = '';

  // ── 4. Backgrounds ─────────────────────────────────────────────────────────
  out += `<rect width="${W}" height="${H}" fill="white"/>`;
  out += `<rect x="${PAD.l}" y="${PAD.t}" width="${PW}" height="${PH}" fill="white"/>`;
  out += `<defs><clipPath id="pc"><rect x="${PAD.l}" y="${PAD.t}" width="${PW}" height="${PH}"/></clipPath></defs>`;

  // ── 5. Grid ────────────────────────────────────────────────────────────────
  if(opts.grid){
    out += `<g clip-path="url(#pc)" stroke="#dde3ef" stroke-width="0.8">`;
    // Vertical grid lines at BE values (x-axis, reversed — high BE on left)
    for(let v=Math.ceil(ber.min/ber.step)*ber.step; v<=ber.max+ber.step*0.01; v+=ber.step){
      const {x}=toSVG(v, ker.min, ber, ker);
      out+=`<line x1="${x.toFixed(1)}" y1="${PAD.t}" x2="${x.toFixed(1)}" y2="${PAD.t+PH}"/>`;
    }
    // Horizontal grid lines at KE values (y-axis, increasing upward)
    for(let v=Math.ceil(ker.min/ker.step)*ker.step; v<=ker.max+ker.step*0.01; v+=ker.step){
      const y=PAD.t+PH-(v-ker.min)/(ker.max-ker.min)*PH;
      out+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${PAD.l+PW}" y2="${y.toFixed(1)}"/>`;
    }
    out += `</g>`;
  }

  // ── 6. Diagonal alpha lines ────────────────────────────────────────────────
  // alpha' = BE + KE => KE = alpha' - BE.
  // With BE in negative direction on x-axis these appear with slope +1 on screen.
  if(opts.lines && pts.length>0){
    const alphas=pts.map(p=>p.be+p.ke);
    const aMin=Math.min(...alphas), aMax=Math.max(...alphas);
    const aSpan=Math.max(aMax-aMin,1);
    const aR=niceRange(aMin-aSpan*0.7, aMax+aSpan*0.7, 6);

    out += `<g clip-path="url(#pc)">`;
    const lineLabels=[];

    for(let a=aR.min; a<=aR.max+aR.step*0.01; a+=aR.step){
      const segs=[];
      // Left edge  (be = ber.max)  -> ke = a - ber.max
      const keAtLeft=a-ber.max;
      if(keAtLeft>=ker.min && keAtLeft<=ker.max) segs.push(toSVG(ber.max,keAtLeft,ber,ker));
      // Right edge (be = ber.min)  -> ke = a - ber.min
      const keAtRight=a-ber.min;
      if(keAtRight>=ker.min && keAtRight<=ker.max) segs.push(toSVG(ber.min,keAtRight,ber,ker));
      // Top edge   (ke = ker.max)  -> be = a - ker.max
      const beAtTop=a-ker.max;
      if(beAtTop>ber.min && beAtTop<ber.max) segs.push(toSVG(beAtTop,ker.max,ber,ker));
      // Bottom edge(ke = ker.min)  -> be = a - ker.min
      const beAtBot=a-ker.min;
      if(beAtBot>ber.min && beAtBot<ber.max) segs.push(toSVG(beAtBot,ker.min,ber,ker));
      if(segs.length<2) continue;

      const isNear=alphas.some(av=>Math.abs(av-a)<aR.step*0.15);
      const col=isNear?'#1d4ed8':'#94a3b8';
      const sw=isNear?1.4:0.8;
      const dash=isNear?'':'5,4';
      out+=`<line x1="${segs[0].x.toFixed(1)}" y1="${segs[0].y.toFixed(1)}" x2="${segs[1].x.toFixed(1)}" y2="${segs[1].y.toFixed(1)}" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${dash}" opacity="${isNear?0.75:0.5}"/>`;

      // Label at the topmost point (lowest screen y = highest KE)
      const lp=segs.slice().sort((a,b)=>a.y-b.y)[0];
      lineLabels.push({x:lp.x, y:lp.y, a, col});
    }
    out += `</g>`;

    lineLabels.forEach(ll=>{
      out+=`<text x="${(ll.x+3).toFixed(1)}" y="${(ll.y-3).toFixed(1)}" font-size="8.5" font-family="'Space Mono',monospace" fill="${ll.col}" opacity="0.9">α'=${ll.a.toFixed(1)}</text>`;
    });
  }

  // ── 6b. Slope-1 and slope-3 guide lines through anchor points ────────────
  // PHYSICS (Moretti 1998; Biesinger 2017):
  //   Slope-1 line: KE = α' − BE  →  α' is CONSTANT along the line.
  //                 Final-state relaxation is the same for every point on it.
  //                 What VARIES between points on the same slope-1 line is the
  //                 INITIAL STATE (Madelung potential + ground-state valence charge).
  //
  //   Slope-3 line: KE = (KE₀ + 3·BE₀) − 3·BE  →  initial-state effects are
  //                 CONSTANT along the line.
  //                 What VARIES between points on the same slope-3 line is the
  //                 FINAL STATE (extra-atomic relaxation / polarization energy).
  //
  // Both drawn through each point that the user has ⊙-anchored.
  if(opts.slopeLines && anchorIds.size>0){
    // Helper: clip a line defined by two data points to the plot box, return SVG seg or null
    function clipLine(be1, ke1, be2, ke2){
      // Liang-Barsky style: parameterise as P(t) = (be1+t*(be2-be1), ke1+t*(ke2-ke1)), t∈[0,1]
      const segs=[];
      // re-use edge-intersection approach with the plot data bounds
      const dbe=be2-be1, dke=ke2-ke1;
      // Find t at each of the 4 edges
      const ts=[];
      if(dbe!==0){
        ts.push((ber.max-be1)/dbe); // left screen edge  (high BE)
        ts.push((ber.min-be1)/dbe); // right screen edge (low BE)
      } else {
        if(be1<ber.min||be1>ber.max) return null;
      }
      if(dke!==0){
        ts.push((ker.min-ke1)/dke); // bottom edge
        ts.push((ker.max-ke1)/dke); // top edge
      } else {
        if(ke1<ker.min||ke1>ker.max) return null;
      }
      const inside=t=>{ const be=be1+t*dbe, ke=ke1+t*dke; return be>=ber.min&&be<=ber.max&&ke>=ker.min&&ke<=ker.max; };
      const candidates=[0,1,...ts].filter(t=>t>=0&&t<=1&&inside(t));
      if(candidates.length<2) return null;
      const tMin=Math.min(...candidates), tMax=Math.max(...candidates);
      if(Math.abs(tMax-tMin)<1e-9) return null;
      return [
        toSVG(be1+tMin*dbe, ke1+tMin*dke, ber, ker),
        toSVG(be1+tMax*dbe, ke1+tMax*dke, ber, ker)
      ];
    }

    const S1_COL='#0891b2'; // cyan-700 — slope-1 (constant α')
    const S3_COL='#7c3aed'; // violet-700 — slope-3 (constant initial state)

    out += `<g clip-path="url(#pc)">`;
    pts.filter(p=>anchorIds.has(p.id)).forEach(p=>{
      // ── Slope-1 line: KE = (p.be+p.ke) − BE  (α' = const) ──────────────
      // Two widely-spaced points on this line:
      const s1 = clipLine(ber.min, p.ke+(p.be-ber.min), ber.max, p.ke+(p.be-ber.max));
      if(s1){
        out+=`<line x1="${s1[0].x.toFixed(1)}" y1="${s1[0].y.toFixed(1)}" x2="${s1[1].x.toFixed(1)}" y2="${s1[1].y.toFixed(1)}" stroke="${S1_COL}" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.85"/>`;
        // Label near the top endpoint
        const tp=s1.slice().sort((a,b)=>a.y-b.y)[0];
        out+=`<text x="${(tp.x+4).toFixed(1)}" y="${(tp.y-3).toFixed(1)}" font-size="9" font-family="'Space Mono',monospace" fill="${S1_COL}" font-weight="bold" opacity="0.9">slope=1 (\u0394init.)</text>`;
      }
      // ── Slope-3 line: KE = (p.ke + 3·p.be) − 3·BE ──────────────────────
      const c3 = p.ke + 3*p.be;
      const s3 = clipLine(ber.min, c3-3*ber.min, ber.max, c3-3*ber.max);
      if(s3){
        out+=`<line x1="${s3[0].x.toFixed(1)}" y1="${s3[0].y.toFixed(1)}" x2="${s3[1].x.toFixed(1)}" y2="${s3[1].y.toFixed(1)}" stroke="${S3_COL}" stroke-width="1.8" stroke-dasharray="4,4" opacity="0.85"/>`;
        // Label near the top endpoint
        const tp=s3.slice().sort((a,b)=>a.y-b.y)[0];
        out+=`<text x="${(tp.x+4).toFixed(1)}" y="${(tp.y-3).toFixed(1)}" font-size="9" font-family="'Space Mono',monospace" fill="${S3_COL}" font-weight="bold" opacity="0.9">slope=3 (\u0394final)</text>`;
      }
      // Anchor indicator ring around the reference point
      const {x:ax,y:ay}=toSVG(p.be,p.ke,ber,ker);
      out+=`<circle cx="${ax.toFixed(1)}" cy="${ay.toFixed(1)}" r="${p.size+4}" fill="none" stroke="${S1_COL}" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>`;
    });
    out += `</g>`;

    // Legend block in top-right corner (inside the SVG, outside clip so always visible)
    const lx=PAD.l+PW-2, ly=PAD.t+8;
    out+=`<rect x="${(lx-118).toFixed(0)}" y="${ly}" width="120" height="40" rx="3" fill="white" stroke="#cbd5e1" stroke-width="0.8" opacity="0.92"/>`;
    out+=`<line x1="${(lx-114).toFixed(0)}" y1="${(ly+11).toFixed(0)}" x2="${(lx-100).toFixed(0)}" y2="${(ly+11).toFixed(0)}" stroke="${S1_COL}" stroke-width="1.8" stroke-dasharray="8,4"/>`;
    out+=`<text x="${(lx-96).toFixed(0)}" y="${(ly+14).toFixed(0)}" font-size="8" font-family="'Space Mono',monospace" fill="${S1_COL}">slope=1 (\u0394 init. state)</text>`;
    out+=`<line x1="${(lx-114).toFixed(0)}" y1="${(ly+27).toFixed(0)}" x2="${(lx-100).toFixed(0)}" y2="${(ly+27).toFixed(0)}" stroke="${S3_COL}" stroke-width="1.8" stroke-dasharray="4,4"/>`;
    out+=`<text x="${(lx-96).toFixed(0)}" y="${(ly+30).toFixed(0)}" font-size="8" font-family="'Space Mono',monospace" fill="${S3_COL}">slope=3 (\u0394 final state)</text>`;
  }

  // ── 7. Reference ghost points ──────────────────────────────────────────────
  if(opts.ref && pts.length>0 && syms.length===1){
    const el=dbClean.find(e=>e.sym===syms[0]);
    if(el){
      out += `<g clip-path="url(#pc)" opacity="0.28">`;
      el.compounds.forEach(c=>{
        const {x,y}=toSVG(c.be,c.ke,ber,ker);
        if(x<PAD.l||x>PAD.l+PW||y<PAD.t||y>PAD.t+PH) return;
        out+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>`;
        out+=`<text x="${(x+6).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="8.5" font-family="'Space Mono',monospace" fill="#64748b">${esc(c.lbl)}</text>`;
      });
      out += `</g>`;
    }
  }

  // ── 8. Axes border ─────────────────────────────────────────────────────────
  out += `<rect x="${PAD.l}" y="${PAD.t}" width="${PW}" height="${PH}" fill="none" stroke="#475569" stroke-width="1.5"/>`;

  // ── 9. X-axis ticks + labels (BE, negative direction) ──────────────────────
  for(let v=Math.ceil(ber.min/ber.step)*ber.step; v<=ber.max+ber.step*0.01; v+=ber.step){
    const {x}=toSVG(v,ker.min,ber,ker);
    out+=`<line x1="${x.toFixed(1)}" y1="${PAD.t+PH}" x2="${x.toFixed(1)}" y2="${PAD.t+PH+5}" stroke="#475569" stroke-width="1"/>`;
    out+=`<text x="${x.toFixed(1)}" y="${PAD.t+PH+17}" font-size="11" font-family="'Space Mono',monospace" fill="#334155" text-anchor="middle">${fmt(v)}</text>`;
  }

  // ── 10. Y-axis ticks + labels (KE, upward) ─────────────────────────────────
  for(let v=Math.ceil(ker.min/ker.step)*ker.step; v<=ker.max+ker.step*0.01; v+=ker.step){
    const y=PAD.t+PH-(v-ker.min)/(ker.max-ker.min)*PH;
    out+=`<line x1="${PAD.l-5}" y1="${y.toFixed(1)}" x2="${PAD.l}" y2="${y.toFixed(1)}" stroke="#475569" stroke-width="1"/>`;
    out+=`<text x="${PAD.l-9}" y="${(y+4).toFixed(1)}" font-size="11" font-family="'Space Mono',monospace" fill="#334155" text-anchor="end">${fmt(v)}</text>`;
  }

  // ── 11. Axis labels + title ─────────────────────────────────────────────────
  out+=`<text x="${(PAD.l+PW/2).toFixed(1)}" y="${H-10}" font-size="13" font-family="'Space Mono',monospace" fill="#1e293b" text-anchor="middle" font-weight="700">${esc(xLbl)}</text>`;
  out+=`<text x="16" y="${(PAD.t+PH/2).toFixed(1)}" font-size="13" font-family="'Space Mono',monospace" fill="#1e293b" text-anchor="middle" font-weight="700" transform="rotate(-90,16,${(PAD.t+PH/2).toFixed(1)})">${esc(yLbl)}</text>`;
  if(opts.lines && pts.length>0){
    const rx=PAD.l+PW+PAD.r-8;
    out+=`<text x="${rx}" y="${(PAD.t+PH/2).toFixed(1)}" font-size="11" font-family="'Space Mono',monospace" fill="#1d4ed8" text-anchor="middle" transform="rotate(90,${rx},${(PAD.t+PH/2).toFixed(1)})">α' = BE + KE (eV)</text>`;
  }
  out+=`<text x="${(W/2).toFixed(1)}" y="26" font-size="15" font-family="'Syne',sans-serif" fill="#0f172a" text-anchor="middle" font-weight="700">${esc(plotTitle)}</text>`;

  // ── 12. Data points ─────────────────────────────────────────────────────────
  out += `<g clip-path="url(#pc)">`;
  pts.forEach(p=>{
    const {x,y}=toSVG(p.be,p.ke,ber,ker);
    out+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${p.size}" fill="${p.color}" stroke="white" stroke-width="1.5" opacity="0.92"/>`;
    if(opts.labels){
      const lx=x+p.size+5, ly=y+4;
      out+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10.5" font-family="'Space Mono',monospace" stroke="white" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke" fill="${p.color}">${esc(p.label)}</text>`;
    }
  });
  out += `</g>`;

  // ── 13. Empty state ─────────────────────────────────────────────────────────
  if(pts.length===0){
    out+=`<text x="${(W/2).toFixed(1)}" y="${(H/2-10).toFixed(1)}" font-size="13" font-family="'Space Mono',monospace" fill="#94a3b8" text-anchor="middle">Select an element and add data points</text>`;
    out+=`<text x="${(W/2).toFixed(1)}" y="${(H/2+12).toFixed(1)}" font-size="11" font-family="'Space Mono',monospace" fill="#64748b" text-anchor="middle">to generate the Wagner plot</text>`;
  }

  return out;
}


// ============================================================
// EXPORT — SVG → CANVAS
// ============================================================
function svgToCanvas(cb){
  const svg    = document.getElementById('plotSvg');
  const data   = new XMLSerializer().serializeToString(svg);
  const scale  = 3;
  const canvas = document.createElement('canvas');
  canvas.width  = W*scale;
  canvas.height = H*scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale,scale);
  ctx.fillStyle='white';
  ctx.fillRect(0,0,W,H);
  const blob = new Blob([data],{type:'image/svg+xml;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = ()=>{ ctx.drawImage(img,0,0); URL.revokeObjectURL(url); cb(canvas); };
  img.onerror= ()=>{ alert('SVG render failed. Try a different browser.'); URL.revokeObjectURL(url); };
  img.src = url;
}

function exportJPG(){
  svgToCanvas(c=>{
    const a=document.createElement('a');
    a.download='wagner_plot.jpg';
    a.href=c.toDataURL('image/jpeg',0.95);
    a.click();
  });
}

function exportPDF(){
  svgToCanvas(c=>{
    try{
      const { jsPDF } = window.jspdf;
      // A4 landscape: 297 x 210 mm
      const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
      const PAGE_W=297, PAGE_H=210;
      const ML=18, MR=18, MT=12; // margins: left, right, top

      // ── Title ──────────────────────────────────────────────────────────────
      // Strip Unicode chars that jsPDF helvetica cannot render (subscripts, arrows etc.)
      const sanitize = s => s.replace(/[\u0080-\uFFFF]/g, c => {
        const map = { '\u2013':'-','\u2014':'-','\u03b1':"alpha'",'\u2032':"'",
                      '\u2081':'1','\u2082':'2','\u2083':'3','\u2084':'4',
                      '\u2085':'5','\u00b2':'2','\u00b3':'3','\u00b9':'1' };
        return map[c] || '';
      });

      const rawTitle = document.getElementById('titleField').value.trim() || "Wagner Plot - XPS Chemical State Analysis";
      const ttl = sanitize(rawTitle);
      pdf.setFont('helvetica','bold');
      pdf.setFontSize(14);
      pdf.setTextColor(20);
      pdf.text(ttl, PAGE_W/2, MT+6, {align:'center'});

      // ── Element info subtitle (ASCII only) ─────────────────────────────────
      const syms=[...new Set(pts.map(p=>p.element).filter(Boolean))];
      let subtitleY = MT+12;
      if(syms.length){
        pdf.setFont('helvetica','normal');
        pdf.setFontSize(8);
        pdf.setTextColor(90);
        const elTxt = syms.map(s=>{
          const e=dbClean.find(d=>d.sym===s);
          return e ? sanitize(s+' ('+e.core+' / '+e.auger+')') : s;
        });
        pdf.text('Elements: '+elTxt.join('  |  '), PAGE_W/2, subtitleY, {align:'center'});
        subtitleY += 6;
      }

      // ── Plot image ─────────────────────────────────────────────────────────
      const imgD = c.toDataURL('image/jpeg',0.97);
      const usableW = PAGE_W - ML - MR;
      const usableH = PAGE_H - subtitleY - 52; // 52mm reserved for table+footer
      const ar = W/H;
      let iw=usableW, ih=iw/ar;
      if(ih>usableH){ ih=usableH; iw=ih*ar; }
      const ix = (PAGE_W-iw)/2;
      const iy = subtitleY + 2;
      pdf.addImage(imgD,'JPEG',ix,iy,iw,ih);

      // ── Data table ─────────────────────────────────────────────────────────
      // Place table below the image with guaranteed gap, well inside margins
      const TABLE_L = ML + 4;           // table left edge (inset from page margin)
      const TABLE_R = PAGE_W - MR - 4;  // table right edge
      const ty = iy + ih + 8;           // 8 mm gap between image and table header

      if(pts.length>0 && ty < PAGE_H-16){
        // Column positions (all relative to TABLE_L, total span = TABLE_R-TABLE_L = ~253mm)
        // Cols: Label(55) | Elem(18) | Core(32) | Auger(30) | BE(22) | KE(22) | AP(22)
        const colW=[55,18,32,30,22,22,22]; // mm widths
        const cols=[TABLE_L];
        colW.slice(0,-1).forEach((w,i)=>cols.push(cols[i]+w));

        const hdrs=['Label','Elem','Core Level','Auger Trans.','BE (eV)','KE (eV)',"AP (eV)"];

        // Header row
        pdf.setFontSize(7);
        pdf.setFont('helvetica','bold');
        pdf.setTextColor(20);
        hdrs.forEach((h,i)=>pdf.text(h, cols[i], ty));

        // Rule under header
        pdf.setDrawColor(160);
        pdf.setLineWidth(0.3);
        pdf.line(TABLE_L, ty+1.2, TABLE_R, ty+1.2);

        // Data rows
        pdf.setFont('helvetica','normal');
        pdf.setFontSize(7);
        pdf.setTextColor(50);
        let ry=ty+5;
        pts.forEach((p,idx)=>{
          if(ry>PAGE_H-10) return;
          // Alternate row shading
          if(idx%2===0){
            pdf.setFillColor(245,247,250);
            pdf.rect(TABLE_L, ry-3.5, TABLE_R-TABLE_L, 5, 'F');
          }
          const ap = (p.be+p.ke).toFixed(2);
          const row=[
            sanitize(p.label).substring(0,30),
            p.element||'',
            sanitize(p.core||''),
            sanitize(p.auger||''),
            p.be.toFixed(2),
            p.ke.toFixed(2),
            ap
          ];
          row.forEach((v,i)=>{
            // Truncate text to fit column
            const maxW = colW[i]-2;
            pdf.text(String(v), cols[i], ry, {maxWidth: maxW});
          });
          ry+=5;
        });

        // Bottom rule
        pdf.setDrawColor(160);
        pdf.line(TABLE_L, ry-2, TABLE_R, ry-2);
      }

      // ── Footer ─────────────────────────────────────────────────────────────
      pdf.setFontSize(6);
      pdf.setTextColor(160);
      pdf.text('Generated: '+new Date().toLocaleString()+' | HarwellXPS WagnerPlot Tool', ML, PAGE_H-5);
      pdf.text('alpha\'=BE+KE', PAGE_W-MR, PAGE_H-5, {align:'right'});

      pdf.save('wagner_plot.pdf');
    } catch(e){ console.error(e); alert('PDF export failed: '+e.message); }
  });
}

function exportCSV(){
  if(!pts.length){ alert('No data points to export.'); return; }
  const rows=[['Label','Element','Core Level','Auger Transition','Binding Energy (eV)','Auger KE (eV)',"Auger Parameter alpha' (eV)"]];
  pts.forEach(p=>rows.push([
    `"${p.label.replace(/"/g,'""')}"`, p.element,
    `"${p.core}"`, `"${p.auger}"`,
    p.be, p.ke, (p.be+p.ke).toFixed(3)
  ]));
  const csv=rows.map(r=>r.join(',')).join('\r\n');
  const a=document.createElement('a');
  a.download='wagner_plot_data.csv';
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.click();
}
</script>
